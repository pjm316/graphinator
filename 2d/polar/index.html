<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Polar Grapher</title>
    <link rel="stylesheet" href="../../app.css" />
  </head>
  <body>
    <h1>Polar Grapher</h1>
    <div id="status">Loading...</div>

    <div class="page-layout">
      <div class="controls">
        <div class="eq-list" id="pol-eqs"></div>
        <button class="add-btn" id="pol-add" type="button">
          + Add equation
        </button>
        <div class="pt-list" id="pol-pts"></div>
        <button class="add-btn" id="pol-pts-add" type="button">
          + Add point
        </button>
        <hr />
        <div class="check-row">
          <div class="inline-field">
            <label for="pol-rmax">r max (0 = auto)</label>
            <input id="pol-rmax" type="number" value="0" min="0" step="0.5" />
          </div>
          <div class="lw-wrap">
            <label for="pol-lw">Line width</label
            ><input
              id="pol-lw"
              type="number"
              value="1.5"
              min="0.5"
              max="5"
              step="0.5"
            />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="pol-width">SVG width</label
            ><input
              id="pol-width"
              type="number"
              value="672"
              min="200"
              step="24"
            />
          </div>
          <div class="field">
            <label for="pol-height">SVG height</label
            ><input
              id="pol-height"
              type="number"
              value="672"
              min="120"
              step="24"
            />
          </div>
        </div>
      </div>
      <div class="graph-area">
        <div class="error" id="pol-error" role="alert"></div>
        <div class="graph" id="pol-graph"></div>
        <button class="dl-btn" id="pol-dl" type="button" disabled>
          Save as SVG
        </button>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="main.js"></script>
  </body>
</html>
