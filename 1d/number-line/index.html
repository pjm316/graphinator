<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Number Line</title>
    <link rel="stylesheet" href="../../app.css" />
  </head>
  <body>
    <h1>Number Line</h1>
    <div id="status">Loading...</div>

    <div class="page-layout">
      <div class="controls">
        <div class="check-row">
          <label class="check-lbl"
            ><input type="radio" name="nl-mode" value="inequality" checked />
            Inequalities</label
          >
          <label class="check-lbl"
            ><input type="radio" name="nl-mode" value="skip-counting" /> Skip
            Counting</label
          >
        </div>

        <div id="nl-ineq-section">
          <div class="eq-list" id="nl-eqs"></div>
        </div>

        <div id="nl-sc-section" hidden>
          <div class="row">
            <div class="field">
              <label for="nl-sc-start">Start at</label
              ><input id="nl-sc-start" type="number" value="0" step="1" />
            </div>
            <div class="field">
              <label for="nl-sc-step">Count by</label
              ><input
                id="nl-sc-step"
                type="number"
                value="2"
                min="0.1"
                step="0.5"
              />
            </div>
          </div>
        </div>

        <hr />
        <div class="row">
          <div class="field">
            <label for="nl-xmin">xmin</label
            ><input id="nl-xmin" type="number" value="-10" step="1" />
          </div>
          <div class="field">
            <label for="nl-xmax">xmax</label
            ><input id="nl-xmax" type="number" value="10" step="1" />
          </div>
          <div class="field">
            <label for="nl-xstep">step</label
            ><input
              id="nl-xstep"
              type="number"
              value="1"
              min="0.1"
              step="0.5"
            />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="nl-width">SVG width</label
            ><input
              id="nl-width"
              type="number"
              value="672"
              min="200"
              step="24"
            />
          </div>
          <div class="field">
            <label for="nl-height">SVG height</label
            ><input
              id="nl-height"
              type="number"
              value="144"
              min="80"
              step="12"
            />
          </div>
        </div>
        <div class="check-row" id="nl-lw-section">
          <div class="lw-wrap">
            <label for="nl-lw">Line width</label
            ><input
              id="nl-lw"
              type="number"
              value="1.5"
              min="0.5"
              max="5"
              step="0.5"
            />
          </div>
        </div>
      </div>
      <div class="graph-area">
        <div class="error" id="nl-error" role="alert"></div>
        <div class="graph" id="nl-graph"></div>
        <button class="dl-btn" id="nl-dl" type="button" disabled>
          Save as SVG
        </button>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="main.js"></script>
  </body>
</html>
